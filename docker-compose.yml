services:
  mysql:
    image: mysql:8.0
    container_name: paxcanina-mysql
    restart: always
    environment:
      MYSQL_DATABASE: paxcanina_db
      MYSQL_USER: paxuser
      MYSQL_PASSWORD: paxpw
      MYSQL_ROOT_PASSWORD: rootpw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: paxcanina-mysql
      MYSQL_ROOT_PASSWORD: rootpw
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: paxcanina-nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - /c/Users/flavi/Desktop/projet-fil-rouge-backend-Flavionz/uploads/public:/usr/share/nginx/html/images
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    env_file:
      - .env
    depends_on:
      - mysql

  maildev:
    image: maildev/maildev
    container_name: paxcanina-maildev
    restart: always
    ports:
      - "1080:1080"   # Web UI
      - "1025:1025"   # SMTP (usato da Spring Boot)
    environment:
      - MAILDEV_INCOMING_USER=
      - MAILDEV_INCOMING_PASS=

volumes:
  mysql_data:
