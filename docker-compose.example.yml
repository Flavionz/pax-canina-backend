services:
  mysql:
    image: mysql:8.0
    container_name: paxcanina-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: paxcanina-nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./uploads/public:/usr/share/nginx/html/images
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    env_file:
      - .env
    depends_on:
      - mysql

  maildev:
    image: maildev/maildev
    container_name: paxcanina-maildev
    restart: always
    ports:
      - "1080:1080"
      - "1025:1025"
    environment:
      - MAILDEV_INCOMING_USER=${MAILDEV_INCOMING_USER}
      - MAILDEV_INCOMING_PASS=${MAILDEV_INCOMING_PASS}

volumes:
  mysql_data:
