spring.config.import=optional:file:.env[.properties],optional:file:.local.env[.properties]

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

public.upload.folder=${PUBLIC_UPLOAD_FOLDER}
private.upload.folder=${PRIVATE_UPLOAD_FOLDER}
file.default.accepted.types=image/jpeg,image/png,image/webp

spring.jpa.defer-datasource-initialization=true
jwt.secret=${JWT_SECRET}
spring.security.user.name=admin
spring.security.user.password=admin123

thedogapi.api-key=live_u2LBYhcM27Dj5IrpZ4yqh9oAAQ5zSau6QSwnwTolKyLjVueqwdSDuqTQoal4FoOQ
thedogapi.base-url=https://api.thedogapi.com/v1

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.web.authentication=DEBUG

# ==== SMTP FAKE/MINIMO PER AVVIO/APPLICAZIONE ====
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
